name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# 같은 브랜치에서 새 푸시가 오면 진행 중인 실행을 취소.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Lint · Test · Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: ktlint 검사
        run: ./gradlew ktlintCheck

      - name: 단위 테스트
        run: ./gradlew testDebugUnitTest

      - name: 디버그 APK 빌드
        run: ./gradlew assembleDebug

      - name: 디버그 APK 업로드
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: warn
          retention-days: 14

  instrumented:
    name: 계측 테스트 (에뮬레이터)
    runs-on: ubuntu-latest
    needs: build # 린트·단위·빌드가 통과한 뒤에만 실행
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      # 에뮬레이터 하드웨어 가속(KVM) 활성화
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: 계측 테스트 (connectedDebugAndroidTest)
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          disable-animations: true
          # GitHub 러너엔 하드웨어 GPU 가 없으므로 소프트웨어 렌더(swiftshader) 강제 → 부팅 멈춤 방지
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -no-snapshot -camera-back none -camera-front none
          emulator-boot-timeout: 900
          force-avd-creation: true
          script: ./gradlew connectedDebugAndroidTest

      - name: 계측 테스트 리포트 업로드
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: instrumented-test-report
          path: app/build/reports/androidTests/connected/**
          if-no-files-found: warn
          retention-days: 14
